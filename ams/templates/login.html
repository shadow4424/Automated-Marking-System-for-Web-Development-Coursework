{% extends "base.html" %}

{% block title %}Sign In — AMS{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card card animate-slideUp">
        <div class="auth-header">
            <div class="auth-logo">A</div>
            <h1 class="auth-title">Sign In</h1>
            <p class="auth-subtitle">Automated Marking System</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
            <div class="form-group">
                <label class="form-label" for="user_id">User ID <span class="required">*</span></label>
                <input type="text" id="user_id" name="user_id" class="form-input" placeholder="Enter your User ID"
                    required autofocus autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" class="form-input"
                    placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
