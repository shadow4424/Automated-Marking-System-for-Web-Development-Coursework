<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AMS - Automated Marking System{% endblock %}</title>
    <meta name="description" content="Automated Marking System for Web Development Coursework">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    {% block head %}{% endblock %}
</head>

<body>
    <nav class="navbar">
        <div class="container navbar-inner">
            <div class="navbar-brand">
                <a href="{{ url_for('home') }}" class="navbar-logo">AMS</a>
            </div>
            <div class="navbar-nav">
                <a href="{{ url_for('home') }}"
                    class="nav-link {% if request.endpoint == 'home' %}active{% endif %}">Home</a>
                <a href="{{ url_for('mark') }}"
                    class="nav-link {% if request.endpoint == 'mark' %}active{% endif %}">Mark</a>
                <a href="{{ url_for('batch') }}"
                    class="nav-link {% if request.endpoint == 'batch' %}active{% endif %}">Batch</a>
                <a href="{{ url_for('runs') }}"
                    class="nav-link {% if request.endpoint == 'runs' %}active{% endif %}">Runs</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} animate-slideUp">
                <span>{{ message }}</span>
                <button type="button" class="alert-close">&times;</button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>

</html>
